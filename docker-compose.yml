services:
  seo-data-reader-mcp:
    build: .
    env_file:
      - path: .env
        required: false
    stdin_open: true
    tty: false
    restart: "no"

  seo-data-reader-mcp-http:
    build: .
    env_file:
      - path: .env
        required: false
    command:
      - python
      - -m
      - seo_data_reader_mcp.server
      - --transport
      - http
      - --host
      - 0.0.0.0
      - --port
      - "8765"
    ports:
      - "${MCP_HTTP_PORT:-8765}:8765"
    restart: unless-stopped
